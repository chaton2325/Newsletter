<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperçu Telegram - {{ draft.subject or 'Newsletter' }}</title>
    <style>
        body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f1f3f5; }
        .banner {
            background: #229ED9; color: #fff; padding: 14px 20px;
            font-size: 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .banner strong { font-weight: 600; }
        .status { text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; opacity: 0.85; }
        .subject-bar {
            background: #fff; padding: 16px 20px; border-bottom: 1px solid #e0e0e0;
            font-size: 18px; font-weight: 700; color: #212529;
        }
        .content-wrapper { max-width: 700px; margin: 20px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .content-wrapper img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="banner">
        <span><i>📱</i> Aperçu envoyé depuis Telegram</span>
        <span class="status">{{ draft.status }}</span>
    </div>
    <div class="subject-bar">{{ draft.subject or 'Sans objet' }}</div>
    <div class="content-wrapper">
        {{ draft.content | safe if draft.content else '<p style="color:#999;">Aucun contenu généré pour le moment.</p>' | safe }}
    </div>
</body>
</html>
