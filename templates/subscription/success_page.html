<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.success }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .success-card { max-width: 500px; margin: auto; border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card success-card text-center p-5">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            </div>
            <h2 class="fw-bold mb-3">{{ t.success }}</h2>
            <p class="text-muted mb-4 fs-5">{{ t.success_msg }}</p>
            
            {% if groups %}
            <div class="mb-4">
                {% for g in groups %}
                    <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 m-1">{{ g.name }}</span>
                {% endfor %}
            </div>
            {% endif %}

            <div class="d-grid mt-2">
                <p class="text-muted small">{% if t.per_month == '/mois' %}Vous pouvez fermer cet onglet.{% else %}You can close this tab.{% endif %}</p>
            </div>
        </div>
    </div>
</body>
</html>
